version: "3.9"

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: datagn_postgres
    environment:
      POSTGRES_USER: datagn
      POSTGRES_PASSWORD: datagn
      POSTGRES_DB: datagn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datagn"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis Cache & Queue
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: datagn_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # MinIO Object Storage (S3-compatible)
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: datagn_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Keycloak SSO (Optional)
  # ===========================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: datagn_keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8082:8080"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json
    profiles:
      - sso

  # ===========================================
  # DataGN Web Application
  # ===========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datagn_web
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://datagn:datagn@postgres:5432/datagn
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: datagn
      S3_REGION: us-east-1
      KEYCLOAK_ISSUER: http://datagn_keycloak:8080/realms/datagn
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8082
      NEXTAUTH_URL: http://localhost:3000
      KEYCLOAK_CLIENT_ID: datagn-web
      KEYCLOAK_CLIENT_SECRET: change-me
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - production

  # ===========================================
  # Development Server (Hot Reload)
  # ===========================================
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: datagn_dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://datagn:datagn@postgres:5432/datagn
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: datagn
      S3_REGION: us-east-1
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: dev-secret-key-minimum-32-characters
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - dev

volumes:
  pgdata:
  redisdata:
  miniodata:
